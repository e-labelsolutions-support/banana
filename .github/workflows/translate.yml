name: Translate

on:
  push:
    branches: [prod]

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --filter @banana/web...

      - name: Extract translations
        working-directory: apps/web
        run: pnpm lingui:extract

      - name: Compile translations
        working-directory: apps/web
        run: pnpm lingui:compile

      - name: Commit translations
        run: |
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          if ls apps/web/src/locales/*/messages.ts 1> /dev/null 2>&1; then
            git add apps/web/src/locales/*/messages.ts apps/web/src/locales/*/messages.json
            git diff --staged --quiet || (git commit -m "chore: compile translations" && git push)
          fi
