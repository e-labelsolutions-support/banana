services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: banana_db
      POSTGRES_USER: banana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - banana_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banana -d banana_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrate
    environment:
      - NODE_ENV=production
      - POSTGRES_URL=${POSTGRES_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: web
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  banana_postgres_data:
