services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: banana_db
      POSTGRES_USER: banana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - banana_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banana -d banana_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrate
    environment:
      - NODE_ENV=production
      - POSTGRES_URL=${POSTGRES_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: seed
    environment:
      - NODE_ENV=production
      - POSTGRES_URL=${POSTGRES_URL}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: web
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_ALLOW_CREDENTIALS=true
      - NEXT_PUBLIC_DISABLE_EMAIL=true
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  banana_postgres_data:
